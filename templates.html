<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassBoard チャット</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 15px; display: flex; flex-direction: column; height: 90vh; }
        .header { padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 10px; background: #e9ecef; position: relative; }
        .my-message { background: #dcf8c6; align-self: flex-end; }
        .user-name { font-weight: bold; font-size: 0.8em; color: #555; }
        .time { font-size: 0.7em; color: #999; margin-left: 10px; }
        .del-btn { color: red; text-decoration: none; font-size: 0.8em; margin-left: 10px; border: none; background: none; cursor: pointer; }
        .input-area { padding: 15px; border-top: 1px solid #ddd; }
        input[type="text"] { width: 70%; padding: 12px; border-radius: 20px; border: 1px solid #ddd; font-size: 16px; }
        button.send { width: 25%; padding: 12px; border-radius: 20px; border: none; background: #007bff; color: white; font-weight: bold; font-size: 16px; }
        .back-btn { text-decoration: none; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{{ url_for('index') }}" class="back-btn">← 戻る</a>
            <span>チャットスペース</span>
            <small>{{ username }}</small>
        </div>
        
        <div class="chat-box">
            {% for msg in messages %}
            <div class="message {% if msg.username == username %}my-message{% endif %}">
                <div class="user-name">{{ msg.username }} <span class="time">{{ msg.created_at }}</span>
                    {% if role == 'admin' %}
                    <form action="{{ url_for('delete_chat', msg_id=msg.id) }}" method="post" style="display:inline;">
                        <button type="submit" class="del-btn" onclick="return confirm('削除しますか？')">[削除]</button>
                    </form>
                    {% endif %}
                </div>
                <div class="text">{{ msg.message }}</div>
            </div>
            {% endfor %}
        </div>

        <div class="input-area">
            <form action="{{ url_for('chat') }}" method="post" style="display: flex; justify-content: space-between;">
                <input type="text" name="message" placeholder="メッセージを入力..." required autocomplete="off">
                <button type="submit" class="send">送信</button>
            </form>
        </div>
    </div>
</body>
</html>
