<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>週・月予定表 - ClassBoard</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; padding: 15px; text-align: center; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        .pdf-viewer { width: 100%; height: 500px; border: 1px solid #ddd; margin-top: 15px; }
        .upload-section { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 8px; border: 1px solid #c8e6c9; }
        .btn-back { display: block; margin-top: 20px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📅 週・月間予定表</h2>
        
        <!-- PDFの表示エリア（CloudinaryのURL） -->
        <iframe src="https://cloudinary.com" class="pdf-viewer"></iframe>
        
        <p><a href="https://cloudinary.com" target="_blank">↗️ 全画面で開く・ダウンロード</a></p>

        {% if role == 'admin' %}
        <div class="upload-section">
            <h4 style="margin-top:0;">📤 予定表の更新（PDF・画像）</h4>
            <form method="post" enctype="multipart/form-data">
                <input type="file" name="file" accept=".pdf,image/*" required>
                <button type="submit" style="background:#2ecc71; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">更新する</button>
            </form>
            <p style="font-size:0.8em; color:#666;">※更新すると古い予定表は上書きされます</p>
        </div>
        {% endif %}

        <a href="/" class="btn-back">← 戻る</a>
    </div>
</body>
</html>
