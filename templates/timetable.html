<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassBoard 時間割</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; padding: 15px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 15px; }
        th, td { border: 1px solid #eee; text-align: center; padding: 8px; font-size: 14px; }
        th { background: #007bff; color: white; height: 40px; }
        td { height: 60px; }
        .period-num { background: #f8f9fa; font-weight: bold; width: 30px; }
        input[type="text"] { width: 100%; border: 1px solid transparent; text-align: center; font-size: 14px; padding: 10px 0; background: #fffde7; border-radius: 4px; }
        input[type="text"]:focus { border-color: #007bff; outline: none; background: #fff; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📅 時間割</h2>
        <table>
            <tr>
                <th style="width:10%;"></th>
                {% for d in days %}<th>{{ d }}</th>{% endfor %}
            </tr>
            {% for p in periods %}
            <tr>
                <td class="period-num">{{ p }}</td>
                {% for d_idx in range(days|length) %}
                <td>
                    {% if role in ['admin', 'teacher'] %}
                    <form method="post" style="margin:0;">
                        <input type="hidden" name="day" value="{{ d_idx }}">
                        <input type="hidden" name="period" value="{{ p }}">
                        <input type="text" name="subject" value="{{ table.get((d_idx, p), '') }}" onchange="this.form.submit()" placeholder="...">
                    </form>
                    {% else %}
                        <strong>{{ table.get((d_idx, p), '') }}</strong>
                    {% endif %}
                </td>
                {% endfor %}
            </tr>
            {% endfor %}
        </table>
        <a href="/chat" class="back-link">← チャットに戻る</a>
    </div>
</body>
</html>
