<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassBoard チャット</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 15px; display: flex; flex-direction: column; height: 90vh; }
        .header { padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 10px; background: #e9ecef; position: relative; }
        .my-message { background: #dcf8c6; align-self: flex-end; }
        .dm-label { font-size: 0.7em; background: #ff4757; color: white; padding: 2px 5px; border-radius: 4px; margin-right: 5px; }
        .user-name { font-weight: bold; font-size: 0.8em; color: #555; }
        .time { font-size: 0.7em; color: #999; margin-left: 10px; }
        .del-btn { color: red; text-decoration: none; font-size: 0.8em; margin-left: 10px; border: none; background: none; cursor: pointer; }
        .input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; }
        select, input[type="text"] { padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        button.send { padding: 12px 20px; border-radius: 10px; border: none; background: #007bff; color: white; font-weight: bold; }
        .back-btn { text-decoration: none; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{{ url_for('index') }}" class="back-btn">← 戻る</a>
            <span>チャット</span>
            <small>{{ username }}</small>
        </div>
        
        <div class="chat-box">
            {% for msg in messages %}
            <div class="message {% if msg.username == username %}my-message{% endif %}">
                <div class="user-name">
                    {% if msg.receiver != 'all' %}<span class="dm-label">DM</span>{% endif %}
                    {{ msg.username }} 
                    {% if msg.receiver != 'all' %} > {{ msg.receiver }}{% endif %}
                    <span class="time">{{ msg.created_at }}</span>
                    {% if role == 'admin' %}
                    <form action="{{ url_for('delete_chat', msg_id=msg.id) }}" method="post" style="display:inline;">
                        <button type="submit" class="del-btn" onclick="return confirm('削除しますか？')">[消去]</button>
                    </form>
                    {% endif %}
                </div>
                <div class="text">{{ msg.message }}</div>
            </div>
            {% endfor %}
        </div>

        <form action="{{ url_for('chat') }}" method="post" class="input-area">
            <div style="font-size: 0.8em; color: #666;">送信先:</div>
            <div class="input-row">
                <select name="receiver">
                    <option value="all">📢 全員</option>
                    <option value="admin">🚨 管理者へ（ホットライン）</option>
                    {% for u in users %}
                    {% if u.username != 'admin' %}
                    <option value="{{ u.username }}">👤 {{ u.username }} 宛</option>
                    {% endif %}
                    {% endfor %}
                </select>
                <input type="text" name="message" placeholder="メッセージ..." required style="flex:1;">
                <button type="submit" class="send">送信</button>
            </div>
        </form>
    </div>
</body>
</html>
