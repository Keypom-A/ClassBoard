<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ClassBoard Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ============================
           全体レイアウト
        ============================ */
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f5f5f5;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* ============================
           サイドバー（PC）
        ============================ */
        #sidebar {
            width: 260px;
            background: #ffffff;
            border-right: 1px solid #ddd;
            padding: 10px 0;
            overflow-y: auto;
        }

        .sidebar-header {
            font-size: 20px;
            font-weight: bold;
            padding: 12px 20px;
            border-bottom: 1px solid #ddd;
        }

        .chat-list {
            padding: 10px 0;
        }

        .chat-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }

        .chat-link:hover {
            background: #f0f0f0;
        }

        .badge-notify {
            display: none;
            background: #ff3b30;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        /* ============================
           チャット画面
        ============================ */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chatDisplay {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .msg-row {
            margin-bottom: 12px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            word-break: break-all;
        }

        .my-msg {
            background: #d1eaff;
            margin-left: auto;
        }

        .other-msg {
            background: #ffffff;
            border: 1px solid #ddd;
        }

        .user-name {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        /* ============================
           送信フォーム
        ============================ */
        #sendForm {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        #messageInput {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        #sendBtn {
            margin-left: 10px;
            padding: 10px 16px;
            font-size: 16px;
            border: none;
            background: #007aff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        /* ============================
           スマホ用ハンバーガー
        ============================ */
        #hamburger {
            display: none;
        }

        #overlay {
            display: none;
        }


        
        @media (max-width: 768px) {
            #sidebar {
                height: calc(var(--vh, 1vh) * 100);
            }
        }

        @media (max-width: 768px) {
            #chatDisplay {
                max-height: calc(var(--vh, 1vh) * 100 - 120px);
                overflow-y: auto;
            }
        }

        @media (max-width: 768px) {
            .chat-container {
                height: calc(var(--vh, 1vh) * 100);}
        }
        @media (max-width: 768px) {

            #hamburger {
                display: block;
                position: fixed;
                top: 12px;
                left: 12px;
                font-size: 28px;
                padding: 6px 10px;
                background: white;
                border-radius: 6px;
                z-index: 2000;
                box-shadow: 0 2px 6px rgba(0,0,0,0.2);
                cursor: pointer;
            }

            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 240px;
                height: 100%;
                background: white;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 1500;
                box-shadow: 4px 0 12px rgba(0,0,0,0.15);
            }

            #sidebar.open {
                transform: translateX(0);
            }

            #overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.3);
                z-index: 1400;
            }

            #overlay.open {
                display: block;
            }

            .chat-container {
                margin-top: 50px;
            }
        }
    </style>
</head>

<body>

    <!-- ハンバーガー -->
    <div id="hamburger" onclick="toggleMenu()">☰</div>
    <div id="overlay" onclick="toggleMenu()"></div>

    <div class="container">

        <!-- ============================
             サイドバー
        ============================ -->
        <div id="sidebar">
            <div class="sidebar-header">ClassBoard</div>

            <div class="chat-list">

                <!-- 全体チャット -->
                <a class="chat-link" href="/chat?room=all" data-rx="all">
                    <span>全体チャット</span>
                    <span class="badge-notify"></span>
                </a>

                <!-- DM -->
                {% for u in dm_users %}
                <a class="chat-link" href="/chat?user={{ u }}" data-rx="{{ u }}">
                    <span>{{ u }}</span>
                    <span class="badge-notify"></span>
                </a>
                {% endfor %}

                <!-- グループ -->
                {% for g in groups %}
                <a class="chat-link" href="/chat?group={{ g }}" data-rx="{{ g }}">
                    <span>グループ: {{ g }}</span>
                    <span class="badge-notify"></span>
                </a>
                {% endfor %}

            </div>
        </div>

        <!-- ============================
             チャット画面
        ============================ -->
        <div class="chat-container">

            <div id="chatDisplay">
                {% for msg in messages %}
                <div class="msg-row">
                    <div class="message {% if msg.is_me %}my-msg{% else %}other-msg{% endif %}">
                        <div class="user-name">{{ msg.username }}</div>

                        {% if msg.file_path %}
                            <div><img src="{{ msg.file_path }}" style="max-width: 200px; border-radius: 8px;"></div>
                        {% endif %}

                        <div>{{ msg.message }}</div>
                        <div style="font-size: 10px; opacity: 0.6; margin-top: 4px;">
                            {{ msg.created_at }}
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>

            <form id="sendForm" method="POST" enctype="multipart/form-data">
                <input id="messageInput" name="message" type="text" placeholder="メッセージを入力…" autocomplete="off">
                <input type="file" name="file" style="margin-left: 10px;">
                <button id="sendBtn">送信</button>
            </form>

        </div>
    </div>

    <!-- ============================
         JS に必要な変数を埋め込む
    ============================ -->
    <script>
        window.username = "{{ username }}";
        window.currentPartner = "{{ partner if partner else '' }}";
        window.currentGroup = "{{ group if group else '' }}";
    </script>

    <script src="/static/chat.js"></script>
    <script>
    // スマホの 100vh 問題を解決するための処理
    function setVh() {
        document.documentElement.style.setProperty(
            '--vh',
            `${window.innerHeight * 0.01}px`
        );
    }
    setVh();
    window.addEventListener('resize', setVh);
    </script>
</body>
</html>
