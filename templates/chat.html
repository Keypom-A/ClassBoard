<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ClassBoard Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ============================
           全体レイアウト
        ============================ */
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f5f5f5;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* ============================
           サイドバー（PC）
        ============================ */
        #sidebar {
            width: 260px;
            background: #ffffff;
            border-right: 1px solid #ddd;
            padding: 10px 0;
            overflow-y: auto;
        }

        .sidebar-header {
            font-size: 20px;
            font-weight: bold;
            padding: 12px 20px;
            border-bottom: 1px solid #ddd;
        }

        .chat-list {
            padding: 10px 0;
        }

        .chat-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }

        .chat-link:hover {
            background: #f0f0f0;
        }

        .badge-notify {
            display: none;
            background: #ff3b30;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        /* ============================
           チャット画面
        ============================ */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chatDisplay {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .msg-row {
            margin-bottom: 12px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 12px;
            word-break: break-all;
        }

        .my-msg {
            background: #d1eaff;
            margin-left: auto;
        }

        .other-msg {
            background: #ffffff;
            border: 1px solid #ddd;
        }

        .user-name {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        /* ============================
           送信フォーム
        ============================ */
        #sendForm {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        #messageInput {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        #sendBtn {
            margin-left: 10px;
            padding: 10px 16px;
            font-size: 16px;
            border: none;
            background: #007aff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        /* ============================
           スマホ用ハンバーガー
        ============================ */
        #hamburger {
            display: none;
        }

        #overlay {
            display: none;
        }

        @media (max-width: 768px) {

            #hamburger {
                display: block;
                position: fixed;
